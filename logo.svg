<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 40" width="192" height="40">
  <!-- Pion stylisé -->
  <g>
    <!-- Tête -->
    <circle cx="18" cy="8" r="6.5" fill="#f0c040"/>
    <!-- Cou -->
    <rect x="15.5" y="13.5" width="5" height="4" rx="1" fill="#f0c040"/>
    <!-- Corps -->
    <path d="M12 17.5 C11 20 11 23 14 24.5 L22 24.5 C25 23 25 20 24 17.5 Z" fill="#f0c040"/>
    <!-- Base haute -->
    <rect x="10" y="25" width="16" height="4.5" rx="2" fill="#f0c040"/>
    <!-- Base basse -->
    <rect x="7.5" y="29" width="21" height="5" rx="2.5" fill="#c8a020"/>
  </g>
  <!-- "Coup" -->
  <text x="44" y="27" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="900" font-size="21" fill="#dde0f0" letter-spacing="0.4">Coup</text>
  <!-- "D" en doré -->
  <text x="103" y="27" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="900" font-size="21" fill="#f0c040" letter-spacing="0.4">D</text>
  <!-- "Echec" -->
  <text x="118" y="27" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="900" font-size="21" fill="#dde0f0" letter-spacing="0.4">Echec</text>
</svg>
