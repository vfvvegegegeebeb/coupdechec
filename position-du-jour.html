<html lang="fr">
<head>

<meta name="description" content="Un nouveau puzzle d'échecs chaque jour. Trouvez le meilleur coup de la position du jour et analysez avec Stockfish."/>

<meta property="og:title" content="Position du jour — Puzzle quotidien échecs"/>
<meta property="og:description" content="Un puzzle d'échecs différent chaque jour. Analysez la position avec Stockfish."/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--surface:#16162a;--card:#1e1e35;--border:#2a2a48;
  --gold:#f0c040;--gold2:#c8a020;--text:#dde0f0;--muted:#7070a0;
  --light-sq:#f0d9b5;--dark-sq:#b58863;
  --green:#2ecc71;--red:#e74c3c;--orange:#f39c12;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--gold);text-decoration:none}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--text);text-decoration:none}
.logo em{color:var(--gold);font-style:normal}
.nav-back{color:var(--muted);font-size:.83rem;text-decoration:none;transition:color .15s}
.nav-back:hover{color:var(--text)}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;gap:28px}

/* HEADER */
.page-header{text-align:center;max-width:520px}
.day-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 14px;border-radius:999px;
  border:1px solid var(--border);background:var(--surface);
  font-size:.7rem;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:14px;
}
.day-badge em{color:var(--gold);font-style:normal;font-weight:700}
h1{font-family:'Syne',sans-serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:800;margin-bottom:6px}
.sub{font-size:.88rem;color:var(--muted)}

/* CARD */
.puzzle-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:28px;display:flex;flex-direction:column;align-items:center;gap:20px;
  width:100%;max-width:520px;
}

/* DIFFICULTY */
.diff-badge{
  padding:4px 14px;border-radius:999px;font-size:.72rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;
}
.diff-facile   {background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.diff-moyen    {background:rgba(243,156,18,.12);color:var(--orange);border:1px solid rgba(243,156,18,.3)}
.diff-difficile{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.3)}

.puzzle-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;text-align:center}

/* BOARD */
.board-wrap{position:relative;width:min(420px,calc(100vw - 64px));aspect-ratio:1}
.board{
  display:grid;grid-template-columns:repeat(8,1fr);
  width:100%;height:100%;
  border:2px solid #555;border-radius:4px;overflow:hidden;
  user-select:none;
}
.sq{
  display:flex;align-items:center;justify-content:center;
  aspect-ratio:1;font-size:clamp(1.4rem,5vw,2.6rem);line-height:1;
  cursor:default;
}
.sq.light{background:var(--light-sq)}
.sq.dark {background:var(--dark-sq)}
.sq.wp,.sq.wn,.sq.wb,.sq.wr,.sq.wq,.sq.wk{color:#fff;text-shadow:0 0 3px rgba(0,0,0,.8),0 1px 4px rgba(0,0,0,.6)}
.sq.bp,.sq.bn,.sq.bb,.sq.br,.sq.bq,.sq.bk{color:#1a1a1a;text-shadow:0 0 3px rgba(255,255,255,.4),0 1px 2px rgba(0,0,0,.4)}

/* TURN indicator */
.turn-row{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted)}
.turn-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.turn-dot.white{background:#f0f0f0;border:1px solid #aaa}
.turn-dot.black{background:#222;border:1px solid #666}

/* SOLUTION toggle */
.solution-wrap{width:100%;text-align:center}
.solution-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);border-radius:8px;padding:8px 18px;
  font-size:.8rem;cursor:pointer;transition:.15s;
  font-family:inherit;
}
.solution-btn:hover{border-color:var(--gold);color:var(--gold)}
.solution-text{
  display:none;margin-top:10px;
  font-family:monospace;font-size:1rem;font-weight:700;color:var(--gold);
  letter-spacing:.5px;
}
.solution-text.visible{display:block}

/* CTA */
.btn-gold{
  display:inline-flex;align-items:center;gap:9px;
  padding:13px 28px;background:var(--gold);color:#111;
  border-radius:9px;font-weight:800;font-size:.95rem;
  font-family:'Syne',sans-serif;text-decoration:none;
  transition:background .15s,transform .1s;
  box-shadow:0 0 20px rgba(240,192,64,.2);
  width:100%;justify-content:center;
}
.btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-gold:active{transform:translateY(0)}

/* LOADER */
.loader{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  color:var(--muted);font-size:.88rem;padding:60px 0;
}
.spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
footer{text-align:center;padding:24px;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border)}
footer a{color:var(--muted)}

@media(max-width:480px){
  nav{padding:12px 16px}
  .puzzle-card{padding:20px 16px}
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="/">Coup<em>Déchec</em></a>
  <a class="nav-back" href="/">← Retour à l'analyseur</a>
</nav>

<main>
  <div class="page-header">
    <div class="day-badge">Puzzle · <em id="date-label">…</em></div>
    <h1>Position du jour</h1>
    <p class="sub">Une nouvelle position chaque jour — même position pour tous</p>
  </div>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    Chargement de la position…
  </div>

  <div id="puzzle-card" class="puzzle-card" style="display:none">
    <div id="diff-badge" class="diff-badge">—</div>
    <div id="puzzle-title" class="puzzle-title">—</div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>

    <div class="turn-row">
      <div class="turn-dot" id="turn-dot"></div>
      <span id="turn-label">—</span>
    </div>

    <div class="solution-wrap">
      <button class="solution-btn" id="sol-btn">Voir la solution</button>
      <div class="solution-text" id="sol-text"></div>
    </div>

    <a class="btn-gold" id="analyze-btn" href="#">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/>
      </svg>
      Analyser avec Stockfish
    </a>
  </div>
</main>

<footer><a href="/">CoupDéchec</a> · Position du jour · Puzzle quotidien</footer>

<script>
(function () {
  'use strict';

  var SUPABASE_URL = 'https://mzzdnganybacsehrouwm.supabase.co';
  var ANON_KEY    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16emRuZ2FueWJhY3NlaHJvdXdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTI5MTUsImV4cCI6MjA5MTIyODkxNX0.4twVSNCpT5HhVQD-bH4AtVseRgTUCn8ZOB-PcxMVSDA';

  // ── Pièces Unicode ─────────────────────────────────────────────────────────
  var PIECES = {
    K:'♔', Q:'♕', R:'♖', B:'♗', N:'♘', P:'♙',
    k:'♚', q:'♛', r:'♜', b:'♝', n:'♞', p:'♟'
  };
  var CLASS_MAP = {
    K:'wk',Q:'wq',R:'wr',B:'wb',N:'wn',P:'wp',
    k:'bk',q:'bq',r:'br',b:'bb',n:'bn',p:'bp'
  };

  // ── Rendu du plateau ───────────────────────────────────────────────────────
  function renderBoard(fen) {
    var parts  = fen.split(' ');
    var rows   = parts[0].split('/');
    var board  = document.getElementById('board');
    board.innerHTML = '';

    for (var r = 0; r < 8; r++) {
      var row = rows[r];
      var file = 0;
      for (var i = 0; i < row.length; i++) {
        var ch = row[i];
        var n  = parseInt(ch);
        if (!isNaN(n)) {
          for (var j = 0; j < n; j++) {
            board.appendChild(makeSquare(r, file, ''));
            file++;
          }
        } else {
          board.appendChild(makeSquare(r, file, ch));
          file++;
        }
      }
    }
  }

  function makeSquare(rank, file, piece) {
    var sq = document.createElement('div');
    var light = (rank + file) % 2 === 0;
    sq.className = 'sq ' + (light ? 'light' : 'dark');
    if (piece) {
      sq.textContent = PIECES[piece] || '';
      sq.classList.add(CLASS_MAP[piece] || '');
    }
    return sq;
  }

  // ── Date affichée ──────────────────────────────────────────────────────────
  function formatDate() {
    var d = new Date();
    return d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
  }

  // ── Fetch Supabase ─────────────────────────────────────────────────────────
  function fetchPosition() {
    fetch(SUPABASE_URL + '/rest/v1/position_du_jour?select=*', {
      headers: {
        'apikey': ANON_KEY,
        'Authorization': 'Bearer ' + ANON_KEY
      }
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (!data || !data.length) { showError(); return; }
      display(data[0]);
    })
    .catch(showError);
  }

  function display(pos) {
    document.getElementById('loader').style.display = 'none';
    var card = document.getElementById('puzzle-card');
    card.style.display = 'flex';

    // Date
    document.getElementById('date-label').textContent = formatDate();

    // Titre + difficulté
    document.getElementById('puzzle-title').textContent = pos.titre;
    var badge = document.getElementById('diff-badge');
    badge.textContent = pos.difficulte.charAt(0).toUpperCase() + pos.difficulte.slice(1);
    badge.className = 'diff-badge diff-' + pos.difficulte;

    // Tour
    var turn = (pos.fen.split(' ')[1] || 'w') === 'w';
    var dot   = document.getElementById('turn-dot');
    dot.className = 'turn-dot ' + (turn ? 'white' : 'black');
    document.getElementById('turn-label').textContent = turn ? 'Les Blancs jouent' : 'Les Noirs jouent';

    // Plateau
    renderBoard(pos.fen);

    // Solution
    var btn = document.getElementById('sol-btn');
    var txt = document.getElementById('sol-text');
    txt.textContent = '→ ' + pos.solution;
    btn.addEventListener('click', function () {
      txt.classList.toggle('visible');
      btn.textContent = txt.classList.contains('visible') ? 'Masquer la solution' : 'Voir la solution';
    });

    // Lien Analyser
    document.getElementById('analyze-btn').href = '/?' + 'fen=' + encodeURIComponent(pos.fen);
  }

  function showError() {
    document.getElementById('loader').innerHTML =
      '<p style="color:var(--muted)">Impossible de charger la position. <a href="/">Retour</a></p>';
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    fetchPosition();
  });
})();
</script>
</body>
</html>
