<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Puzzle du Jour — CoupDEchec</title>
<meta name="description" content="Résolvez le puzzle du jour fourni par Lichess. Trouvez le meilleur coup !"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#F5C518"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="CoupDEchec"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
<link rel="apple-touch-icon" href="/favicon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f1a;--surface:#16162a;--card:#1e1e35;--border:#2a2a48;
  --gold:#f0c040;--gold2:#c8a020;--text:#dde0f0;--muted:#7070a0;
  --light-sq:#f0d9b5;--dark-sq:#b58863;
  --green:#2ecc71;--red:#e74c3c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;justify-content:space-between}
.logo-sub{color:var(--muted);font-size:.8rem;margin-top:1px}
.ext-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border:2px solid var(--gold);border-radius:8px;color:var(--gold);font-size:.8rem;font-weight:700;text-decoration:none;transition:.15s;white-space:nowrap}
.ext-btn:hover{background:var(--gold);color:#111}
@media(max-width:600px){
  header{flex-direction:column;align-items:flex-start;gap:10px}
  .ext-btn{width:100%;justify-content:center}
}

/* ── Layout ── */
main{flex:1;display:flex;justify-content:center;padding:24px 16px}
.puzzle-wrap{width:100%;max-width:540px;display:flex;flex-direction:column;align-items:stretch;gap:14px}

/* ── Puzzle header card ── */
.puzzle-header{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px}
.puzzle-title{font-size:1.05rem;font-weight:800;color:var(--gold);margin-bottom:4px}
.puzzle-meta{font-size:.78rem;color:var(--muted)}
.color-badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:.75rem;font-weight:700;margin-top:7px}
.color-badge.white{background:#dde0f015;border:1px solid #dde0f030;color:#dde0f0}
.color-badge.black{background:#2a2a4a;border:1px solid #7070a080;color:#aaaacc}

/* ── Board ── */
.board-outer{display:flex;gap:0;width:100%}
.rank-labels{display:flex;flex-direction:column;justify-content:space-around;padding:2px 4px 18px 0;width:18px;flex-shrink:0}
.rank-labels span{font-size:.65rem;color:var(--muted);text-align:right;line-height:1}
.board-col{display:flex;flex-direction:column;flex:1;min-width:0}
.board-wrap{position:relative;width:100%}
#board{display:grid;grid-template-columns:repeat(8,1fr);width:100%;aspect-ratio:1;border:2px solid #555;user-select:none}
.sq{position:relative;display:flex;align-items:center;justify-content:center;aspect-ratio:1}
.sq.light{background:var(--light-sq)}
.sq.dark {background:var(--dark-sq)}
.sq img{width:88%;height:88%;object-fit:contain;pointer-events:all;user-select:none}
.sq img.draggable{cursor:grab}
.sq img.static{cursor:default}
.sq.drag-over{outline:3px inset rgba(240,192,64,.7)}
.sq.hl{box-shadow:inset 0 0 0 4px rgba(240,192,64,.85)}
.file-labels{display:flex;padding:3px 0 0 0;width:100%}
.file-labels span{flex:1;font-size:.65rem;color:var(--muted);text-align:center}

/* ── Animations ── */
@keyframes flashOk{
  0%  {box-shadow:inset 0 0 0 3px var(--green),0 0 16px rgba(46,204,113,.5)}
  100%{box-shadow:none}
}
@keyframes flashErr{
  0%,100%{transform:translateX(0)}
  20%    {transform:translateX(-7px);box-shadow:inset 0 0 0 3px var(--red)}
  40%    {transform:translateX( 7px);box-shadow:inset 0 0 0 3px var(--red)}
  60%    {transform:translateX(-4px);box-shadow:inset 0 0 0 2px rgba(231,76,60,.6)}
  80%    {transform:translateX( 4px);box-shadow:inset 0 0 0 2px rgba(231,76,60,.3)}
}
@keyframes hintPulse{
  0%,100%{box-shadow:0 0 0 3px var(--gold),0 0 14px var(--gold)}
  50%    {box-shadow:0 0 0 6px var(--gold),0 0 32px var(--gold),0 0 54px rgba(240,192,64,.25)}
}
.sq.flash-ok {animation:flashOk .65s ease-out forwards}
.sq.flash-err{animation:flashErr .9s ease-out forwards}
.sq.hint-glow{animation:hintPulse .75s ease-in-out infinite;z-index:2}

/* ── Status bar ── */
.status-bar{
  padding:10px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;font-size:.88rem;text-align:center;
  min-height:42px;display:flex;align-items:center;justify-content:center;
  transition:color .2s,border-color .2s;
}
.status-bar.ok {color:var(--green);font-weight:700;border-color:var(--green)}
.status-bar.err{color:var(--red);  font-weight:700;border-color:var(--red)}

/* ── Buttons ── */
.puzzle-controls{display:flex;gap:10px}
.ctrl-btn{
  flex:1;padding:11px 8px;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:9px;color:var(--text);
  font-size:.85rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:.15s;font-family:inherit;
}
.ctrl-btn:hover:not(:disabled){border-color:var(--gold);background:#1e1e10;color:var(--gold)}
.ctrl-btn:disabled{opacity:.35;cursor:default}

/* ── Success overlay ── */
#success-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.65);align-items:center;justify-content:center;
}
#success-overlay.show{display:flex}
.success-card{
  background:var(--card);border:2px solid var(--gold);border-radius:16px;
  padding:40px 48px;text-align:center;
  box-shadow:0 8px 48px rgba(240,192,64,.3);
  animation:scaleIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes scaleIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.success-emoji{font-size:3.5rem;margin-bottom:12px}
.success-text {font-size:1.4rem;font-weight:900;color:var(--gold);margin-bottom:6px}
.success-sub  {font-size:.85rem;color:var(--muted);margin-bottom:22px}
.success-link {
  display:inline-block;padding:10px 22px;
  background:var(--gold);color:#111;border-radius:8px;
  text-decoration:none;font-weight:800;font-size:.85rem;transition:.15s;
}
.success-link:hover{background:var(--gold2)}
.success-close{
  display:block;margin-top:13px;background:transparent;border:none;
  color:var(--muted);font-size:.8rem;cursor:pointer;font-family:inherit;
}
.success-close:hover{color:var(--text)}

/* ── Loading / Error ── */
.loading-wrap{text-align:center;padding:48px 20px;color:var(--muted)}
.spinner{
  display:inline-block;width:36px;height:36px;
  border:3px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.error-icon{font-size:2.5rem;margin-bottom:12px}
.retry-btn{
  margin-top:16px;padding:10px 22px;
  background:var(--gold);color:#111;
  border:none;border-radius:8px;
  font-weight:800;cursor:pointer;font-family:inherit;font-size:.88rem;
}
.retry-btn:hover{background:var(--gold2)}

/* ── Touch ghost ── */
.touch-ghost{
  position:fixed;pointer-events:none;z-index:9999;
  width:72px;height:72px;
  transform:translate(-50%,-80%);
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.7));
  opacity:.93;will-change:left,top;
}
.sq{touch-action:auto}

footer{text-align:center;padding:12px;color:var(--muted);font-size:.72rem;border-top:1px solid var(--border)}
</style>
</head>

<script>
/* ══════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════ */
var FILES = 'abcdefgh';
function PIECE_IMG(p){ return '/pieces/'+p+'.webp'; }
var TO_FEN = {wK:'K',wQ:'Q',wR:'R',wB:'B',wN:'N',wP:'P',bK:'k',bQ:'q',bR:'r',bB:'b',bN:'n',bP:'p'};
var FROM_FEN = {};
Object.entries(TO_FEN).forEach(function(kv){ FROM_FEN[kv[1]]=kv[0]; });

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
var boardState    = {};
var orientation   = 'white';
var playerColor   = 'w';
var currentTurn   = 'w';
var solution      = [];
var moveIdx       = 0;
var puzzleEnabled = false;
var puzzleId      = '';
var lastFrom      = null;
var lastTo        = null;
var hintTimer     = null;
var dragData      = null;
var touchDrag     = null;
var pendingTouch  = null;

/* ══════════════════════════════════════════════
   APPLY UCI MOVE  →  {board, turn} or null
══════════════════════════════════════════════ */
function applyUci(brd, uci, turn){
  var from=uci.slice(0,2), to=uci.slice(2,4);
  var promo=uci[4]?uci[4].toUpperCase():null;
  var piece=brd[from];
  if(!piece) return null;
  var nb=Object.assign({},brd);
  var fc=TO_FEN[piece];
  /* en passant */
  if(fc==='P'&&from[0]!==to[0]&&!brd[to]) delete nb[to[0]+from[1]];
  /* castling */
  if(fc==='K'){
    if(from==='e1'&&to==='g1'){nb['f1']='wR';delete nb['h1'];}
    else if(from==='e1'&&to==='c1'){nb['d1']='wR';delete nb['a1'];}
    else if(from==='e8'&&to==='g8'){nb['f8']='bR';delete nb['h8'];}
    else if(from==='e8'&&to==='c8'){nb['d8']='bR';delete nb['a8'];}
  }
  nb[to]=promo?(piece[0]+promo):piece;
  delete nb[from];
  return{board:nb,turn:turn==='w'?'b':'w'};
}

/* ══════════════════════════════════════════════
   PGN HELPERS  (rebuild puzzle position)
══════════════════════════════════════════════ */
function isPathClear(brd,from,to){
  var fi0=FILES.indexOf(from[0]),ri0=+from[1];
  var fi1=FILES.indexOf(to[0]),ri1=+to[1];
  var df=fi1-fi0,dr=ri1-ri0,steps=Math.max(Math.abs(df),Math.abs(dr));
  if(steps<=1) return true;
  var sf=Math.sign(df),sr=Math.sign(dr);
  for(var i=1;i<steps;i++) if(brd[FILES[fi0+sf*i]+(ri0+sr*i)]) return false;
  return true;
}
function canPieceReach(brd,pc,from,to,turn){
  var target=brd[to];
  if(target&&target[0]===turn) return false;
  var fi0=FILES.indexOf(from[0]),ri0=+from[1];
  var fi1=FILES.indexOf(to[0]),ri1=+to[1];
  var df=fi1-fi0,dr=ri1-ri0;
  switch(pc[1]){
    case 'P':{
      var dir=turn==='w'?1:-1;
      if(df===0){if(target)return false;if(dr===dir)return true;if(dr===2*dir&&ri0===(turn==='w'?2:7)&&!brd[from[0]+(ri0+dir)])return true;}
      else if(Math.abs(df)===1&&dr===dir)return true;
      return false;}
    case 'N':return(Math.abs(df)===1&&Math.abs(dr)===2)||(Math.abs(df)===2&&Math.abs(dr)===1);
    case 'B':return Math.abs(df)===Math.abs(dr)&&df!==0&&isPathClear(brd,from,to);
    case 'R':return(df===0||dr===0)&&!(df===0&&dr===0)&&isPathClear(brd,from,to);
    case 'Q':return(df===0||dr===0||Math.abs(df)===Math.abs(dr))&&!(df===0&&dr===0)&&isPathClear(brd,from,to);
    case 'K':return Math.abs(df)<=1&&Math.abs(dr)<=1&&(df!==0||dr!==0);
  }
  return false;
}
function startPos(){
  return{a1:'wR',b1:'wN',c1:'wB',d1:'wQ',e1:'wK',f1:'wB',g1:'wN',h1:'wR',
    a2:'wP',b2:'wP',c2:'wP',d2:'wP',e2:'wP',f2:'wP',g2:'wP',h2:'wP',
    a7:'bP',b7:'bP',c7:'bP',d7:'bP',e7:'bP',f7:'bP',g7:'bP',h7:'bP',
    a8:'bR',b8:'bN',c8:'bB',d8:'bQ',e8:'bK',f8:'bB',g8:'bN',h8:'bR'};
}
function parsePgnText(text){
  text=text.replace(/\r\n?/g,'\n');
  var prev;
  do{prev=text;text=text.replace(/\{[^{}]*\}/g,' ');}while(text!==prev);
  text=text.replace(/[{}]/g,' ');
  do{prev=text;text=text.replace(/\[[^\[\]]*\]/g,' ');}while(text!==prev);
  text=text.replace(/[\[\]]/g,' ');
  text=text.replace(/;[^\n]*/g,' ');
  do{prev=text;text=text.replace(/\([^()]*\)/g,' ');}while(text!==prev);
  text=text.replace(/\b(1-0|0-1|1\/2-1\/2)\b/g,' ').replace(/\*/g,' ');
  text=text.replace(/\d+\s*\.+/g,' ');
  return text.trim().split(/\s+/).filter(function(m){
    return m.length>0&&!/^\$/.test(m)&&!/^[!?]+$/.test(m)&&!/^\d+$/.test(m);
  });
}
function pgnApplyMove(brd,castle,turn,san){
  var nb=Object.assign({},brd),nc=Object.assign({},castle);
  var s=san.replace(/[+#!?]/g,'').replace(/\$\d+/g,'').trim();
  var promo=null;
  var pm=s.match(/=([QRBN])$/i);
  if(pm){promo=pm[1].toUpperCase();s=s.slice(0,-2);}
  else{var pm2=s.match(/([QRBN])$/i);if(pm2&&/[18]$/.test(s.slice(-3,-1))){promo=pm2[1].toUpperCase();s=s.slice(0,-1);}}
  if(s==='O-O'||s==='0-0'){
    if(turn==='w'){nb['g1']='wK';nb['f1']='wR';delete nb['e1'];delete nb['h1'];nc.wK=nc.wQ=false;}
    else{nb['g8']='bK';nb['f8']='bR';delete nb['e8'];delete nb['h8'];nc.bK=nc.bQ=false;}
    return{board:nb,castle:nc,turn:turn==='w'?'b':'w'};
  }
  if(s==='O-O-O'||s==='0-0-0'){
    if(turn==='w'){nb['c1']='wK';nb['d1']='wR';delete nb['e1'];delete nb['a1'];nc.wK=nc.wQ=false;}
    else{nb['c8']='bK';nb['d8']='bR';delete nb['e8'];delete nb['a8'];nc.bK=nc.bQ=false;}
    return{board:nb,castle:nc,turn:turn==='w'?'b':'w'};
  }
  var to=s.slice(-2);s=s.slice(0,-2);
  var pt='P';
  if(s.length>0&&/[KQRBN]/.test(s[0])){pt=s[0];s=s.slice(1);}
  s=s.replace('x','');
  var disambig=s,pieceCode=turn+pt,from=null;
  var entries=Object.entries(brd);
  for(var ei=0;ei<entries.length;ei++){
    var sq=entries[ei][0],pc=entries[ei][1];
    if(pc!==pieceCode)continue;
    if(disambig.length===1){
      if(/[a-h]/.test(disambig)&&sq[0]!==disambig)continue;
      if(/[1-8]/.test(disambig)&&sq[1]!==disambig)continue;
    }else if(disambig.length===2&&sq!==disambig)continue;
    if(canPieceReach(brd,pieceCode,sq,to,turn)){from=sq;break;}
  }
  if(!from)return null;
  if(pt==='P'&&from[0]!==to[0]&&!brd[to])delete nb[to[0]+from[1]];
  nb[to]=promo?(turn+promo):pieceCode;
  delete nb[from];
  if(pieceCode==='wK')nc.wK=nc.wQ=false;
  if(pieceCode==='bK')nc.bK=nc.bQ=false;
  if(from==='a1'||to==='a1')nc.wQ=false;
  if(from==='h1'||to==='h1')nc.wK=false;
  if(from==='a8'||to==='a8')nc.bQ=false;
  if(from==='h8'||to==='h8')nc.bK=false;
  return{board:nb,castle:nc,turn:turn==='w'?'b':'w'};
}
function buildPosFromPgn(pgn,plyCount){
  var moves=parsePgnText(pgn);
  var cur={board:startPos(),castle:{wK:true,wQ:true,bK:true,bQ:true},turn:'w'};
  var limit=Math.min(plyCount,moves.length);
  for(var i=0;i<limit;i++){
    var res=pgnApplyMove(cur.board,cur.castle,cur.turn,moves[i]);
    if(!res){console.warn('PGN parse failed at ply',i,moves[i]);break;}
    cur=res;
  }
  return cur;
}

/* ══════════════════════════════════════════════
   BOARD RENDER
══════════════════════════════════════════════ */
function renderBoard(){
  var boardEl=document.getElementById('board');
  boardEl.innerHTML='';
  var ranks    =orientation==='white'?[8,7,6,5,4,3,2,1]:[1,2,3,4,5,6,7,8];
  var fileIdxs =orientation==='white'?[0,1,2,3,4,5,6,7]:[7,6,5,4,3,2,1,0];

  ranks.forEach(function(rank){
    fileIdxs.forEach(function(fi){
      var file=FILES[fi],sq=file+rank;
      var isLight=(fi+rank)%2===0;
      var div=document.createElement('div');
      div.className='sq '+(isLight?'light':'dark');
      div.dataset.sq=sq;
      if(sq===lastFrom||sq===lastTo) div.classList.add('hl');

      var piece=boardState[sq];
      if(piece){
        var img=document.createElement('img');
        img.src=PIECE_IMG(piece);
        img.alt=piece;
        var canDrag=puzzleEnabled&&piece[0]===playerColor&&currentTurn===playerColor;
        if(canDrag){
          img.draggable=true;
          img.className='draggable';
          (function(cSq,cPiece,cImg){
            cImg.addEventListener('dragstart',function(e){
              e.stopPropagation();
              dragData={piece:cPiece,fromSq:cSq};
              e.dataTransfer.effectAllowed='move';
              setTimeout(function(){cImg.style.opacity='.3';},0);
            });
            cImg.addEventListener('dragend',function(){cImg.style.opacity='1';});
          })(sq,piece,img);
        }else{
          img.className='static';
        }
        div.appendChild(img);
      }

      div.addEventListener('dragover',function(e){e.preventDefault();div.classList.add('drag-over');});
      div.addEventListener('dragleave',function(){div.classList.remove('drag-over');});
      div.addEventListener('drop',function(e){
        e.preventDefault();div.classList.remove('drag-over');
        if(!dragData||!dragData.fromSq)return;
        var from=dragData.fromSq,to=sq;
        dragData=null;
        if(from!==to)attemptMove(from,to);
      });

      if(piece&&piece[0]===playerColor&&currentTurn===playerColor&&puzzleEnabled){
        (function(cSq,cPiece){
          div.addEventListener('touchstart',function(e){
            var touch=e.touches[0];
            var el=div.querySelector('img')||div;
            var timer=setTimeout(function(){
              if(!pendingTouch)return;
              var pt=pendingTouch;pendingTouch=null;
              startTouchDrag(cPiece,cSq,el,pt.lastX,pt.lastY);
            },150);
            pendingTouch={timer:timer,startX:touch.clientX,startY:touch.clientY,
              lastX:touch.clientX,lastY:touch.clientY,piece:cPiece,fromSq:cSq,el:el};
          },{passive:false});
        })(sq,piece);
      }

      boardEl.appendChild(div);
    });
  });

  var rl=document.getElementById('rank-labels');rl.innerHTML='';
  ranks.forEach(function(r){var s=document.createElement('span');s.textContent=r;rl.appendChild(s);});
  var fl=document.getElementById('file-labels');fl.innerHTML='';
  fileIdxs.forEach(function(fi){var s=document.createElement('span');s.textContent=FILES[fi];fl.appendChild(s);});
}

/* ══════════════════════════════════════════════
   TOUCH DRAG
══════════════════════════════════════════════ */
function startTouchDrag(piece,fromSq,originEl,x,y){
  var ghost=document.createElement('img');
  ghost.src=PIECE_IMG(piece);ghost.className='touch-ghost';
  ghost.style.left=x+'px';ghost.style.top=y+'px';
  document.body.appendChild(ghost);
  if(originEl)originEl.style.opacity='.2';
  touchDrag={piece:piece,fromSq:fromSq,ghost:ghost,originEl:originEl};
}
document.addEventListener('touchmove',function(e){
  if(touchDrag){
    e.preventDefault();
    var t=e.touches[0];
    touchDrag.ghost.style.left=t.clientX+'px';
    touchDrag.ghost.style.top=t.clientY+'px';
    return;
  }
  if(pendingTouch){
    var t2=e.touches[0];
    var dx=Math.abs(t2.clientX-pendingTouch.startX),dy=Math.abs(t2.clientY-pendingTouch.startY);
    if(dx>12||dy>12){clearTimeout(pendingTouch.timer);pendingTouch=null;}
    else{pendingTouch.lastX=t2.clientX;pendingTouch.lastY=t2.clientY;e.preventDefault();}
  }
},{passive:false});
document.addEventListener('touchend',function(e){
  if(pendingTouch){clearTimeout(pendingTouch.timer);pendingTouch=null;}
  if(!touchDrag)return;
  var td=touchDrag;touchDrag=null;
  var t=e.changedTouches[0];
  td.ghost.style.visibility='hidden';
  var under=document.elementFromPoint(t.clientX,t.clientY);
  td.ghost.remove();
  if(td.originEl)td.originEl.style.opacity='';
  var sqEl=under&&under.closest('.sq');
  if(sqEl&&sqEl.dataset.sq&&sqEl.dataset.sq!==td.fromSq)
    attemptMove(td.fromSq,sqEl.dataset.sq);
},{passive:false});
document.addEventListener('touchcancel',function(){
  if(pendingTouch){clearTimeout(pendingTouch.timer);pendingTouch=null;}
  if(!touchDrag)return;
  touchDrag.ghost.remove();
  if(touchDrag.originEl)touchDrag.originEl.style.opacity='';
  touchDrag=null;
});

/* ══════════════════════════════════════════════
   STATUS
══════════════════════════════════════════════ */
function setStatus(text,cls){
  var el=document.getElementById('status-bar');
  el.textContent=text;
  el.className='status-bar'+(cls?' '+cls:'');
}
function playerPrompt(){
  setStatus(playerColor==='w'?'♔ Blancs jouent — à vous !':'♚ Noirs jouent — à vous !');
}

/* ══════════════════════════════════════════════
   FLASH HELPER
══════════════════════════════════════════════ */
function flashSq(sq,cls,dur){
  var el=document.querySelector('[data-sq="'+sq+'"]');
  if(!el)return;
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
  setTimeout(function(){el.classList.remove(cls);},dur);
}

/* ══════════════════════════════════════════════
   ATTEMPT MOVE
══════════════════════════════════════════════ */
function attemptMove(from,to){
  if(!puzzleEnabled||currentTurn!==playerColor)return;
  var piece=boardState[from];
  if(!piece||piece[0]!==playerColor)return;

  /* auto queen-promotion */
  var promo='';
  if(TO_FEN[piece]==='P'){
    var rank=parseInt(to[1]);
    if((playerColor==='w'&&rank===8)||(playerColor==='b'&&rank===1))promo='q';
  }

  var playerUci=(from+to+promo).toLowerCase();
  var expected=solution[moveIdx].toLowerCase();
  var matches=playerUci===expected||
    (expected.length===5&&expected.slice(0,4)===playerUci&&expected[4]==='q');

  if(matches){
    var res=applyUci(boardState,solution[moveIdx],currentTurn);
    if(!res)return;
    boardState=res.board;currentTurn=res.turn;
    lastFrom=from;lastTo=to;
    moveIdx++;puzzleEnabled=false;
    renderBoard();
    flashSq(to,'flash-ok',650);
    setStatus('✓ Correct !','ok');
    if(moveIdx>=solution.length){setTimeout(showSuccess,700);}
    else{setTimeout(playEngineMove,750);}
  }else{
    flashSq(from,'flash-err',900);
    setStatus('✗ Réessaie !','err');
    setTimeout(function(){if(!puzzleEnabled)return;playerPrompt();},950);
  }
}

/* ══════════════════════════════════════════════
   ENGINE REPLY
══════════════════════════════════════════════ */
function playEngineMove(){
  if(moveIdx>=solution.length){showSuccess();return;}
  var uci=solution[moveIdx];
  var res=applyUci(boardState,uci,currentTurn);
  if(!res){showSuccess();return;}
  lastFrom=uci.slice(0,2);lastTo=uci.slice(2,4);
  boardState=res.board;currentTurn=res.turn;
  moveIdx++;
  renderBoard();
  setStatus('L\'adversaire joue…');
  if(moveIdx>=solution.length){setTimeout(showSuccess,500);}
  else{
    setTimeout(function(){
      puzzleEnabled=true;
      playerPrompt();
      renderBoard();
    },500);
  }
}

/* ══════════════════════════════════════════════
   SUCCESS
══════════════════════════════════════════════ */
function showSuccess(){
  puzzleEnabled=false;
  setStatus('🎉 Puzzle résolu !','ok');
  var themes=document.getElementById('puzzle-meta').dataset.themes||'';
  document.getElementById('success-sub').textContent=
    themes?'Thème(s) : '+themes:'Excellent travail !';
  document.getElementById('success-overlay').classList.add('show');
}

/* ══════════════════════════════════════════════
   HINT
══════════════════════════════════════════════ */
document.getElementById('btn-hint').addEventListener('click',function(){
  if(!puzzleEnabled||moveIdx>=solution.length)return;
  var from=solution[moveIdx].slice(0,2);
  document.querySelectorAll('.sq.hint-glow').forEach(function(el){el.classList.remove('hint-glow');});
  if(hintTimer){clearTimeout(hintTimer);hintTimer=null;}
  var sqEl=document.querySelector('[data-sq="'+from+'"]');
  if(!sqEl)return;
  sqEl.classList.add('hint-glow');
  hintTimer=setTimeout(function(){sqEl.classList.remove('hint-glow');hintTimer=null;},3000);
});

/* ══════════════════════════════════════════════
   GIVE UP
══════════════════════════════════════════════ */
document.getElementById('btn-giveup').addEventListener('click',function(){
  if(moveIdx>=solution.length)return;
  puzzleEnabled=false;
  document.getElementById('btn-hint').disabled=true;
  document.getElementById('btn-giveup').disabled=true;
  setStatus('Solution en cours…');
  setTimeout(playRemaining,400);
});
function playRemaining(){
  if(moveIdx>=solution.length){setStatus('Solution complète.');return;}
  var uci=solution[moveIdx];
  var res=applyUci(boardState,uci,currentTurn);
  if(!res){setStatus('Solution complète.');return;}
  lastFrom=uci.slice(0,2);lastTo=uci.slice(2,4);
  boardState=res.board;currentTurn=res.turn;
  moveIdx++;
  renderBoard();
  setTimeout(playRemaining,800);
}

/* ══════════════════════════════════════════════
   SHOW STATE
══════════════════════════════════════════════ */
function showState(name){
  document.getElementById('state-loading').style.display=name==='loading'?'block':'none';
  document.getElementById('state-error').style.display  =name==='error'  ?'block':'none';
  document.getElementById('state-puzzle').style.display =name==='puzzle' ?'block':'none';
}

/* ══════════════════════════════════════════════
   LOAD LICHESS DAILY PUZZLE
══════════════════════════════════════════════ */
var LICHESS_URL = 'https://lichess.org/api/puzzle/daily';
var PROXY_URL   = 'https://corsproxy.io/?'+encodeURIComponent(LICHESS_URL);

function fetchPuzzle(url){
  return fetch(url,{headers:{'Accept':'application/json'}})
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    });
}

function loadDailyPuzzle(){
  showState('loading');
  console.log('[CoupDEchec] Fetching puzzle from Lichess…');

  fetchPuzzle(LICHESS_URL)
    .then(function(data){
      console.log('[CoupDEchec] Lichess direct OK:', data);
      initPuzzle(data);
    })
    .catch(function(err){
      console.warn('[CoupDEchec] Direct fetch failed ('+err.message+'), trying proxy…');
      fetchPuzzle(PROXY_URL)
        .then(function(data){
          console.log('[CoupDEchec] Proxy OK:', data);
          initPuzzle(data);
        })
        .catch(function(err2){
          console.error('[CoupDEchec] Both fetches failed:', err2);
          showState('error');
          document.getElementById('error-msg').textContent=
            'Impossible de charger le puzzle du jour. Vérifiez votre connexion.';
        });
    });
}

function initPuzzle(data){
  var puzzle=data.puzzle,game=data.game;
  puzzleId=puzzle.id||'';
  solution=puzzle.solution||[];

  /* Rebuild puzzle position from PGN */
  var pos=buildPosFromPgn(game.pgn,puzzle.initialPly);
  boardState=pos.board;
  currentTurn=pos.turn;
  playerColor=pos.turn;
  orientation=playerColor==='w'?'white':'black';

  /* Meta */
  var themes=(puzzle.themes||[]).join(', ');
  var rating=puzzle.rating?'ELO '+puzzle.rating:'';
  var metaEl=document.getElementById('puzzle-meta');
  metaEl.textContent='#'+puzzleId+(rating?' · '+rating:'')+(themes?' · '+themes:'');
  metaEl.dataset.themes=themes;

  var badge=document.getElementById('color-badge');
  badge.textContent=playerColor==='w'?'♔ Vous jouez les Blancs':'♚ Vous jouez les Noirs';
  badge.className='color-badge '+(playerColor==='w'?'white':'black');

  document.getElementById('lichess-link').href='https://lichess.org/training/'+puzzleId;

  lastFrom=null;lastTo=null;
  moveIdx=0;puzzleEnabled=true;
  document.getElementById('btn-hint').disabled=false;
  document.getElementById('btn-giveup').disabled=false;

  showState('puzzle');
  renderBoard();
  playerPrompt();
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
loadDailyPuzzle();

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js').catch(function(e){console.warn('SW:',e);});
  });
}
