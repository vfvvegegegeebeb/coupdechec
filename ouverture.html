<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ouverture d'échecs | CoupDEchec</title>
<meta name="description" content="Découvrez cette ouverture d'échecs : coups principaux, stratégie, variantes et analyse Stockfish."/>
<meta name="robots" content="index, follow"/>
<link rel="canonical" id="canonical-url" href="https://coupdechec.vercel.app/ouvertures"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f1a;--surface:#16162a;--card:#1e1e35;--border:#2a2a48;--gold:#f0c040;--gold2:#c8a020;--text:#dde0f0;--muted:#7070a0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}

nav{display:flex;align-items:center;justify-content:space-between;padding:14px 40px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(15,15,26,.95);backdrop-filter:blur(12px);z-index:100}
.nav-logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);text-decoration:none}
.nav-logo em{color:var(--gold);font-style:normal}
.nav-back{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:.82rem;transition:color .15s}
.nav-back:hover{color:var(--text)}
.nav-back svg{width:14px;height:14px}

/* HERO */
.hero{padding:52px 40px 34px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(240,192,64,.07) 0%,transparent 70%)}
.hero-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.badge{font-size:.7rem;padding:4px 12px;border-radius:999px;font-weight:600;letter-spacing:.3px}
.badge-eco{color:var(--muted);background:var(--surface);border:1px solid var(--border);font-family:monospace}
.badge-cat{color:var(--gold);background:rgba(240,192,64,.09);border:1px solid rgba(240,192,64,.25)}
.badge-color{color:#9dd;background:rgba(153,221,221,.07);border:1px solid rgba(153,221,221,.2)}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(1.9rem,4vw,2.9rem);font-weight:800;line-height:1.1;margin-bottom:10px}
.hero h1 em{color:var(--gold);font-style:normal}
.hero-sub{font-size:.95rem;color:var(--muted);margin-bottom:20px;max-width:600px}
.moves-badge{display:inline-block;font-family:monospace;font-size:.85rem;font-weight:700;color:var(--gold);background:rgba(240,192,64,.09);border:1.5px solid rgba(240,192,64,.28);border-radius:8px;padding:5px 14px}

/* MAIN GRID */
.main{flex:1;max-width:1060px;margin:0 auto;width:100%;padding:44px 24px 0}
.content-grid{display:grid;grid-template-columns:1fr 340px;gap:48px;align-items:start}
@media(max-width:860px){.content-grid{grid-template-columns:1fr}.board-side{order:-1}}

/* LEFT: intro */
.section-label{font-size:.67rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:700;margin-bottom:10px}
.desc-paras p{color:var(--text);font-size:.95rem;line-height:1.75;margin-bottom:14px}

/* RIGHT: board + navigator */
.board-side{display:flex;flex-direction:column;gap:12px;position:sticky;top:88px}
#mini-board{width:100%;display:grid;grid-template-columns:repeat(8,1fr);border:2px solid #555;border-radius:4px;overflow:hidden;user-select:none}
#mini-board>div{aspect-ratio:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
#mini-board img{width:86%;height:86%;object-fit:contain;pointer-events:none;display:block}

.move-nav{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px 14px}
.move-nav-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.move-label{font-family:monospace;font-size:.82rem;font-weight:700;color:var(--gold)}
.move-counter{font-size:.67rem;color:var(--muted)}
.move-comment{font-size:.78rem;color:var(--muted);line-height:1.5;min-height:34px;margin-bottom:10px}
.move-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.move-btns button{padding:6px 4px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:.95rem;font-weight:800;cursor:pointer;transition:.15s}
.move-btns button:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.move-btns button:disabled{opacity:.28;cursor:default}

.analyse-btn{display:flex;align-items:center;justify-content:center;gap:9px;padding:14px 18px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;text-decoration:none;letter-spacing:.2px;transition:opacity .15s,transform .1s;box-shadow:0 4px 22px rgba(240,192,64,.25)}
.analyse-btn:hover{opacity:.88;transform:translateY(-1px)}
.analyse-btn svg{width:17px;height:17px;flex-shrink:0}
.fen-box-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px}
.fen-label-sm{font-size:.58rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:3px;font-weight:700}
.fen-box{font-family:monospace;font-size:.64rem;color:var(--muted);word-break:break-all;line-height:1.55}

/* FULL-WIDTH SECTIONS */
.sections{max-width:1060px;margin:0 auto;width:100%;padding:56px 24px 72px}
.section{margin-top:56px}
.section:first-child{margin-top:0}
.section-title{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;margin-bottom:6px}
.section-title em{color:var(--gold);font-style:normal}
.section-intro{font-size:.85rem;color:var(--muted);margin-bottom:22px;max-width:680px}

/* Idées grid */
.idees-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:600px){.idees-grid{grid-template-columns:1fr}}
.idee-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.idee-card h4{font-family:'Syne',sans-serif;font-size:.87rem;font-weight:800;color:var(--gold);margin-bottom:6px}
.idee-card p{font-size:.81rem;color:var(--muted);line-height:1.6}

/* Variantes */
.variantes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:720px){.variantes-grid{grid-template-columns:1fr}}
.var-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.var-card h4{font-family:'Syne',sans-serif;font-size:.87rem;font-weight:800;margin-bottom:6px}
.var-coups{display:inline-block;font-family:monospace;font-size:.67rem;color:var(--gold);background:rgba(240,192,64,.07);border:1px solid rgba(240,192,64,.18);border-radius:4px;padding:3px 8px;margin-bottom:8px}
.var-card p{font-size:.8rem;color:var(--muted);line-height:1.55}

/* Pourquoi */
.pourquoi-list{display:flex;flex-direction:column;gap:14px}
.pourquoi-list p{font-size:.93rem;color:var(--text);line-height:1.8;padding-left:18px;border-left:3px solid rgba(240,192,64,.5)}

/* Nav openings */
.nav-openings{margin-top:56px;padding-top:32px;border-top:1px solid var(--border)}
.nav-openings h3{font-family:'Syne',sans-serif;font-size:.76rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.nav-list{display:flex;flex-wrap:wrap;gap:7px}
.nav-list a{padding:5px 13px;border:1px solid var(--border);border-radius:6px;font-size:.76rem;color:var(--muted);text-decoration:none;background:var(--surface);transition:.15s}
.nav-list a:hover,.nav-list a.active{border-color:var(--gold);color:var(--gold);background:rgba(240,192,64,.07)}
.nav-list a.active{font-weight:700}

footer{text-align:center;padding:22px;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border)}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--text)}

@media(max-width:500px){nav{padding:12px 16px}.hero{padding:34px 16px 24px}.main{padding:28px 14px 0}.sections{padding:40px 14px 56px}}
</style>
</head>

<div class="sections" id="sections">

<footer>

const ALL = [
  {slug:'sicilienne', name:'Sicilienne'},
  {slug:'francaise',  name:'Française'},

/* ── INIT ─────────────────────────────────────────────────────── */
const rawSlug = window.location.pathname.split('/').filter(s=>s).pop() || '';
const slug = rawSlug.replace(/-/g,'_');
const o = OPENINGS[slug];

if(!o){
  document.getElementById('hero-title').textContent = 'Ouverture introuvable';
  document.getElementById('hero-sub').innerHTML = '<a href="/ouvertures" style="color:var(--gold)">← Retour à la liste</a>';
} else {
  /* Meta */
  document.title = `${o.name} — Stratégie, coups et variantes | CoupDEchec`;
  document.querySelector('meta[name="description"]').content =
    `${o.name} : ${o.sub}. Coups principaux, idées stratégiques, variantes connues et analyse Stockfish en français.`;
  document.getElementById('canonical-url').href = `https://coupdechec.vercel.app/ouvertures/${rawSlug}`;

  /* Hero */
  document.getElementById('hero-badges').innerHTML =
    `<span class="badge badge-eco">${o.eco}</span>
     <span class="badge badge-cat">${o.cat}</span>
     <span class="badge badge-color">Camp : ${o.color}</span>`;
  const parts = o.name.split(' ');
  document.getElementById('hero-title').innerHTML =
    parts.length >= 2
      ? parts.slice(0,-1).join(' ') + ' <em>' + parts[parts.length-1] + '</em>'
      : o.name;
  document.getElementById('hero-sub').textContent = o.sub;
  document.getElementById('moves-badge').textContent = o.moves;

  /* Intro paragraphs */
  const paras = document.getElementById('desc-paras');
  o.paras.forEach(p => { const el=document.createElement('p'); el.textContent=p; paras.appendChild(el); });

  /* Analyse CTA → last step FEN */
  document.getElementById('analyse-btn').href = `/?fen=${encodeURIComponent(o.fen)}`;

  /* Move navigator */
  let stepIdx = 0;
  function setStep(idx){
    if(idx < 0 || idx >= o.steps.length) return;
    stepIdx = idx;
    const s = o.steps[idx];
    // re-render board
    const brd = document.getElementById('mini-board');
    brd.innerHTML = '';
    renderBoard(s.fen, 'mini-board');
    document.getElementById('move-label').textContent = s.label;
    document.getElementById('move-counter').textContent = `${idx+1} / ${o.steps.length}`;
    document.getElementById('move-comment').textContent = s.comment;
    document.getElementById('btn-first').disabled = idx === 0;
    document.getElementById('btn-prev').disabled  = idx === 0;
    document.getElementById('btn-next').disabled  = idx === o.steps.length-1;
    document.getElementById('btn-last').disabled  = idx === o.steps.length-1;
    // update FEN box to current step's FEN
    document.getElementById('fen-display').textContent = s.fen;
  }
  document.getElementById('btn-first').onclick = () => setStep(0);
  document.getElementById('btn-prev').onclick  = () => setStep(stepIdx-1);
  document.getElementById('btn-next').onclick  = () => setStep(stepIdx+1);
  document.getElementById('btn-last').onclick  = () => setStep(o.steps.length-1);
  document.addEventListener('keydown', e => {
    if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
    if(e.key==='ArrowRight'||e.key==='ArrowDown') setStep(stepIdx+1);
    if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   setStep(stepIdx-1);
  });
  setStep(0); // show start position initially

  /* ── SECTIONS ───────────────────────────────────────────────── */
  const sec = document.getElementById('sections');

  /* Idées principales */
  const s1 = document.createElement('div'); s1.className='section';

  o.variantes.forEach(v => {
    const d=document.createElement('div'); d.className='var-card';
    d.innerHTML=`<h4>${v.nom}</h4><span class="var-coups">${v.coups}</span><p>${v.desc}</p>`;
    vg.appendChild(d);
  });

  const s3 = document.createElement('div'); s3.className='section';
  s3.innerHTML = `<h2 class="section-title">Pourquoi jouer <em>${o.name.split(' ').pop()}</em> ?</h2>

  sec.appendChild(s3);
  const pl = document.getElementById('pourquoi-list');
  o.pourquoi.forEach(p => { const el=document.createElement('p'); el.textContent=p; pl.appendChild(el); });

  /* Nav to other openings */
  const s4 = document.createElement('div'); s4.className='section nav-openings';
  s4.innerHTML = `<h3>Autres ouvertures</h3><div class="nav-list" id="nav-list"></div>`;
  sec.appendChild(s4);
  const nl = document.getElementById('nav-list');
  ALL.forEach(item => {
    const a=document.createElement('a');
    a.href=`/ouvertures/${item.slug}`;
    a.textContent=item.name;
    if(item.slug.replace(/-/g,'_')===slug) a.className='active';
    nl.appendChild(a);
  });
}

/* ── BOARD RENDERER ─────────────────────────────────────────── */
function renderBoard(fen, id){
  const FILES='abcdefgh';
  const F={K:'wK',Q:'wQ',R:'wR',B:'wB',N:'wN',P:'wP',k:'bK',q:'bQ',r:'bR',b:'bB',n:'bN',p:'bP'};
  const board={};
  const rows=fen.split(' ')[0].split('/');
  for(let r=0;r<8;r++){
    let fi=0;
    for(const ch of rows[r]){
      if(/\d/.test(ch)) fi+=+ch;
      else{board[FILES[fi]+(8-r)]=F[ch];fi++;}
    }
  }
  const c=document.getElementById(id);
  for(let rank=8;rank>=1;rank--){
    for(let fi=0;fi<8;fi++){
      const sq=FILES[fi]+rank;
      const isLight=(fi+rank)%2===0;
      const cell=document.createElement('div');
      cell.style.background=isLight?'#f0d9b5':'#b58863';
      const piece=board[sq];
      if(piece){
        const img=document.createElement('img');
        img.src=`/pieces/${piece}.png`;
        img.alt=piece; img.draggable=false;
        cell.appendChild(img);
      }
      c.appendChild(cell);
    }
  }
}
